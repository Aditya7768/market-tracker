name: Track Gold & Bitcoin Prices

on:
  schedule:
    - cron: '0 1,7,13,19 * * 1-5'   
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest prices
        env:
          ALPHAVANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_KEY }}
        run: python scripts/fetch_prices.py

      - name: Regenerate dashboard chart
        run: python scripts/generate_chart.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ assets/
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update price data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
